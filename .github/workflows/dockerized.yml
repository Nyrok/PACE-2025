name: Dockerized CI

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: build.Dockerfile
          load: true
          tags: ds-build:latest
          no-cache: true
      - name: Build the Static Binary
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/src:/app \
            -w /app \
            ds-build:latest \
            /bin/sh -c "cmake -DCMAKE_BUILD_TYPE=Static . && make binary_solution"
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: dev.Dockerfile
          load: true
          tags: ds-dev:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Compile with CMake
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/src:/app \
            -w /app \
            ds-dev:latest \
            /bin/sh -c "cmake -DCMAKE_BUILD_TYPE=Release . && make -j$(nproc)"
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: dev.Dockerfile
          load: true
          tags: ds-test:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          
      - name: Compile and Run Test Script
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/src:/app \
            -v ${{ github.workspace }}/testset:/testset \
            -w /app \
            ds-test:latest \
            /bin/sh -c "
              cmake -DCMAKE_BUILD_TYPE=Release . && \
              make -j$(nproc) && \
              cd /root && \
              /root/testall.sh 60s /app/ds_finder /testset | tee /app/test_output.log && \
              if grep -qE 'TO|KO|ERR' /app/test_output.log; then
                echo '❌ FAILURE DETECTED: TO, KO, or ERR found in logs.'
                exit 1
              else
                exit 0
              fi
            "
  leaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: dev.Dockerfile
          load: true
          tags: ds-leaks:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          
      - name: Compile and Check for Memory Leaks
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/src:/app \
            -v ${{ github.workspace }}/testset:/testset \
            -w /app \
            ds-leaks:latest \
            /bin/sh -c "
              cmake -DCMAKE_BUILD_TYPE=Debug . && \
              make ds_finder && \
              timeout -p -k 5s 60s valgrind --leak-check=full \
                       --show-leak-kinds=all \
                       --trace-children=yes \
                       --errors-for-leak-kinds=all \
                       --error-exitcode=42 \
                       ./ds_finder < /testset/ds_lite_1.gr"
  timeout:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: dev.Dockerfile
          load: true
          tags: ds-timeout:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          
      - name: Compile and Check for Timeout management
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/src:/app \
            -v ${{ github.workspace }}/testset:/testset \
            -w /app \
            ds-timeout:latest \
            /bin/sh -c "
              cmake -DCMAKE_BUILD_TYPE=Release . && \
              make -j$(nproc) && \
              (timeout -k 2s 15s ./ds_finder < /testset/ds_lite_1.gr > /app/timeouted.sol || [ \$? -eq 124 ]) && \
              java -jar /root/ds_verifier-1.0.jar /testset/ds_lite_1.gr /app/timeouted.sol | tee /app/test_output.log && \
              if grep -qE 'At least one vertex is not dominated by the given solution!' /app/test_output.log; then
                exit 1
              else
                exit 0
              fi
            " 